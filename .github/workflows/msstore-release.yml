name: Microsoft Store release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag (e.g. 1.1.3)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  msstore:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    runs-on: windows-latest
    steps:
      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.event.release.tag_name }}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${VER}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows unified exe
        run: npm run build:win-unified

      - name: Build MSIX
        shell: pwsh
        env:
          MSSTORE_IDENTITY_PUBLISHER: ${{ secrets.MSSTORE_IDENTITY_PUBLISHER }}
          MSSTORE_IDENTITY_NAME: ${{ secrets.MSSTORE_IDENTITY_NAME }}
          MSSTORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.MSSTORE_PUBLISHER_DISPLAY_NAME }}
        run: ./scripts/build-windows-msix.ps1

      - name: Install Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure msstore credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.MSSTORE_TENANT_ID }}" `
            --sellerId "${{ secrets.MSSTORE_SELLER_ID }}" `
            --clientId "${{ secrets.MSSTORE_CLIENT_ID }}" `
            --clientSecret "${{ secrets.MSSTORE_CLIENT_SECRET }}"

      - name: Publish to Microsoft Store
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          msstore publish "build/MyHomeGames-$version-win-x64.msix" -id "${{ secrets.MSSTORE_APP_ID }}"
